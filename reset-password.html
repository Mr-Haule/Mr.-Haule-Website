<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Mr. Haule Services</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <div class="container auth-container">
    <nav class="navbar-premium">
      <div class="nav-container">
        <div class="logo-premium">
          <div class="logo-icon">
            <i class="fas fa-graduation-cap"></i>
          </div>
          <div class="logo-text">
            <span class="logo-main">Mr. Haule</span>
            <span class="logo-sub">Services</span>
          </div>
        </div>
        <div class="nav-menu">
          <a href="index.html" class="nav-link">Home</a>
          <a href="login.html" class="nav-link">Login</a>
          <a href="register.html" class="nav-link">Register</a>
        </div>
      </div>
    </nav>

    <div class="auth-form-container">
      <div class="auth-card-premium">
        <div class="auth-header-premium">
          <div class="auth-icon">
            <i class="fas fa-lock"></i>
          </div>
          <h2>Set New Password</h2>
          <p>Create a strong password for your account</p>
        </div>

        <form id="resetPasswordForm">
          <div class="input-group-premium">
            <label><i class="fas fa-lock"></i> New Password</label>
            <input type="password" id="newPassword" placeholder="Minimum 6 characters" required>
            <div class="error-message" id="newPasswordError"></div>
          </div>

          <div class="input-group-premium">
            <label><i class="fas fa-check-circle"></i> Confirm Password</label>
            <input type="password" id="confirmNewPassword" placeholder="Confirm your password" required>
            <div class="error-message" id="confirmNewPasswordError"></div>
          </div>

          <button type="submit" class="btn-primary-premium btn-block">
            <i class="fas fa-save"></i> Reset Password
          </button>
        </form>

        <div class="auth-footer">
          <p><a href="login.html">← Back to Login</a></p>
        </div>
      </div>
    </div>

    <footer class="footer-premium-simple">
      <p id="copyright"></p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
