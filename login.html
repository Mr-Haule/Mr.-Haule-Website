<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Mr. Haule Services</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <div class="container auth-container">
    <!-- Premium Navigation -->
    <nav class="navbar-premium">
      <div class="nav-container">
        <div class="logo-premium">
          <div class="logo-icon">
            <i class="fas fa-graduation-cap"></i>
          </div>
          <div class="logo-text">
            <span class="logo-main">Mr. Haule</span>
            <span class="logo-sub">Services</span>
          </div>
        </div>
        <div class="nav-menu">
          <a href="index.html" class="nav-link">Home</a>
          <a href="login.html" class="nav-link active">Login</a>
          <a href="register.html" class="nav-link">Register</a>
        </div>
      </div>
    </nav>

    <div class="auth-form-container">
      <div class="auth-card-premium">
        <div class="auth-header-premium">
          <div class="auth-icon">
            <i class="fas fa-sign-in-alt"></i>
          </div>
          <h2>Welcome Back</h2>
          <p>Login to access your dashboard and request services</p>
        </div>

        <form id="loginForm">
          <div class="input-group-premium">
            <label><i class="fas fa-envelope"></i> Email Address</label>
            <input type="email" id="loginEmail" placeholder="your@email.com" required>
            <div class="error-message" id="loginEmailError"></div>
          </div>

          <div class="input-group-premium">
            <label><i class="fas fa-lock"></i> Password</label>
            <input type="password" id="loginPassword" placeholder="Enter your password" required>
            <div class="error-message" id="loginPasswordError"></div>
          </div>

          <div class="forgot-link">
            <a href="forgot-password.html">Forgot Password?</a>
          </div>

          <button type="submit" class="btn-primary-premium btn-block">
            <i class="fas fa-sign-in-alt"></i> Login
          </button>
        </form>

        <div class="auth-footer">
          <p>Don't have an account? <a href="register.html">Create Account</a></p>
          <div class="demo-info">
            <i class="fas fa-info-circle"></i> Demo: demo@example.com / demo123
          </div>
        </div>
      </div>
    </div>

    <footer class="footer-premium-simple">
      <p id="copyright"></p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
